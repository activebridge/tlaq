        name: "tags"
        widget: "list"
        required: false
        hint: "e.g. paintings, sculptures, jewelry"
      - { label: "Suite", name: "suite", widget: "string", required: false, hint: "e.g. a208 — places the map pin on the building automatically" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Coordinates", name: "coordinates", widget: "string", hint: "Format: -111.76260, 34.86350. Optional if Suite is set.", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Facebook", name: "facebook", widget: "string", required: false }
      - { label: "Full Location", name: "full_location", widget: "string", required: false }
      - label: "Store Hours"
        name: "store_hours"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Monday", name: "monday", widget: "string", required: false }
          - { label: "Tuesday", name: "tuesday", widget: "string", required: false }
          - { label: "Wednesday", name: "wednesday", widget: "string", required: false }
          - { label: "Thursday", name: "thursday", widget: "string", required: false }
          - { label: "Friday", name: "friday", widget: "string", required: false }
          - { label: "Saturday", name: "saturday", widget: "string", required: false }
          - { label: "Sunday", name: "sunday", widget: "string", required: false }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "weddings"
    label: "Weddings"
    folder: "_weddings"
    create: true
    slug: "{{slug}}"
    sort_by: "date"
    sort_direction: Descending
    media_folder: "/assets/images/weddings"
    public_folder: "/assets/images/weddings"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Suite", name: "suite", widget: "string", required: false }
      - { label: "Coordinates", name: "coordinates", widget: "string", hint: "Format: -111.76260, 34.86350", required: false }
      - label: "Intro"
        name: "intro"
        widget: "object"
        collapsed: true
        required: false
        fields:
          - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Site Plan", name: "site_plan", widget: "image", required: false }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "wedding-articles"
    label: "Wedding Articles"
    folder: "_wedding-articles"
    create: true
    slug: "{{slug}}"
    sort_by: "date"
    sort_direction: Descending
    fields:
      - { label: "Category", name: "category", widget: "string", hint: "Wedding slug (e.g., chapel-at-tlaquepaque)" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - label: "Images"
        name: "images"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Content", name: "body", widget: "markdown", required: false }

  - name: "events"
    label: "Events"
    folder: "_events"
    create: true
    slug: "{{slug}}"
    sort_by: "starts_at"
    sort_direction: Descending
    media_folder: "/assets/images/events"
    public_folder: "/assets/images/events"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Published", name: "published", widget: "boolean", default: true, hint: "If false, the event will not be shown on the calendar or website." }
      - { label: "Starts At", name: "starts_at", widget: "datetime" }
      - { label: "Ends At", name: "ends_at", widget: "datetime", required: false, hint: "Usually same date as Starts At with a later end time. For Schedule Type: 'range', this is required and defines the from-to span end." }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Video URL", name: "video_url", widget: "string", required: false, hint: "If set, the yearly event will display a video background instead of an image." }
      - { label: "Subtitle", name: "subtitle", widget: "text" }
      - { label: "Schedule Type", name: "schedule_type", widget: "select", options: ["single", "range", "weekly", "monthly", "yearly"], required: true, hint: "single: one date; range: daily from start to end; weekly: selected weekdays until Recurrence Until; monthly: first selected weekday(s) each month until Recurrence Until; yearly: same date each year, shown in Annual Events." }
      - { label: "Recurrence Until", name: "recurs_until", widget: "datetime", required: false, hint: "Use for weekly/monthly only. Leave empty for single/range/yearly." }
      - { label: "Recurrence Weekdays", name: "recurrence_weekdays", widget: "select", multiple: true, required: false, options: ["sun", "mon", "tue", "wed", "thu", "fri", "sat"], hint: "Use for weekly/monthly only. Leave empty for single/range/yearly." }
      - label: "Schedule"
        name: "schedule"
        widget: "list"
        required: false
        collapsed: true
        fields:
          - { label: "Location", name: "location", widget: "string" }
          - label: "Performances"
            name: "performances"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
      - label: "Map"
        name: "map"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Button Label", name: "button_label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Phone", name: "phone", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Facebook", name: "facebook", widget: "string", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Content", name: "body", widget: "markdown" }
