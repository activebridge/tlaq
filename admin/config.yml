backend:
  name: github
  repo: activebridge/tlaq
  branch: main

media_folder: "/assets/images"
public_folder: "/assets/images"

sveltia:
  hide_announce_banner: true

collections:
  - name: "settings"
    label: "Settings"
    files:
      - name: "site_config"
        label: "Site Configuration"
        file: "_data/site.yml"
        fields:
          - { label: "App Name", name: "app_name", widget: "string" }
          - { label: "App Description", name: "app_description", widget: "string" }
          - {
              label: "Directions URL",
              name: "directions_url",
              widget: "string",
              hint: "Google Maps directions URL. Generate at maps.google.com: search your location → click 'Directions' → copy the browser URL. Used in: site header 'Get Directions' button and Contacts page."
            }
          - { label: "Weather URL", name: "weather_url", widget: "string" }
          - { label: "Weather Widget URL", name: "weather_widget", widget: "string" }
          - { label: "Submission Worker URL", name: "submission_worker_url", widget: "string" }
          - { label: "Newsletter Worker URL", name: "newsletter_worker_url", widget: "string" }
          - { label: "Mapbox Token", name: "mapbox_token", widget: "string" }
          - { label: "Mapbox Style URL", name: "mapbox_style", widget: "string" }
      - name: "footer_config"
        label: "Footer"
        file: "_data/footer.yml"
        fields:
          - { label: "Newsletter Title", name: "title", widget: "string" }
          - { label: "Subscribe Button Text", name: "subscribe_button", widget: "string" }
          - { label: "Phone (raw)", name: "phone", widget: "string" }
          - { label: "Formatted Phone", name: "formatted_phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Street Address", name: "street_address", widget: "string" }
          - { label: "Mail Address", name: "mail_address", widget: "string" }
          - { label: "Organization Name", name: "name", widget: "string" }
          - { label: "Rights Text", name: "rights", widget: "string" }
          - { label: "Privacy Policy Label", name: "privacy_policy_label", widget: "string" }
          - { label: "Terms Label", name: "terms_label", widget: "string" }
          - { label: "Magazine Alt Text", name: "magazine_alt", widget: "string" }
          - label: "Awards"
            name: "awards"
            widget: "list"
            media_folder: "/assets/images/awards"
            public_folder: "/assets/images/awards"
            fields:
              - { label: "Image", name: "image", widget: "image", hint: "Filename must not start with an underscore" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { name: "width", widget: "hidden" }
              - { name: "height", widget: "hidden" }

  - name: "landing_navigation"
    label: "Landing Navigation"
    files:
      - name: "landing_navigation"
        label: "Landing Navigation"
        file: "index.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "home" }
          - { label: "Title", name: "title", widget: "string" }
          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Type", name: "type", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "string" }
                  - { label: "Image", name: "image", widget: "image", hint: "Filename must not start with an underscore" }

  - name: "landing"
    label: "Landing Sections"
    files:
      - name: "banner"
        label: "Banner"
        file: "_landing/banner.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Section", name: "section", widget: "hidden", default: "banner" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large hero heading displayed over the banner image/video." }
          - { label: "Image", name: "image", widget: "image", hint: "Fallback image shown when the background video cannot autoplay (e.g. low-power mode, slow connection). Also used for social sharing previews. Filename must not start with an underscore" }
          - label: "Button"
            name: "button"
            widget: "object"
            hint: "Primary CTA button shown on the banner."
            fields:
              - { label: "Text", name: "text", widget: "string" }
      - name: "village_map"
        label: "Village Map"
        file: "_landing/village-map.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Display order within the articles section. Lower = appears first." }
          - { label: "Section", name: "section", widget: "hidden", default: "articles" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large heading shown above the map." }
          - { label: "Title", name: "title", widget: "string", hint: "Section label shown in the header." }
          - { label: "Description", name: "description", widget: "text", hint: "Body text shown below the heading, above the map embed." }
          - { label: "Empty Message", name: "empty_message", widget: "string", required: false, hint: "Fallback text shown if the map cannot load." }
      - name: "calendar"
        label: "Calendar"
        file: "_landing/calendar.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Display order within the articles section. Lower = appears first." }
          - { label: "Section", name: "section", widget: "hidden", default: "articles" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large heading shown above the calendar widget." }
          - { label: "Title", name: "title", widget: "string", hint: "Section label shown in the header." }
          - { label: "Description", name: "description", widget: "text", hint: "Body text shown below the heading, above the calendar." }
          - { label: "Empty Message", name: "empty_message", widget: "string", hint: "Fallback text shown when no upcoming events exist." }
          - label: "Link"
            name: "link"
            widget: "object"
            hint: "Text link shown below the calendar (e.g. 'View All Events')."
            fields:
              - { label: "Text", name: "text", widget: "string" }
      - name: "whats_new"
        label: "What's New"
        file: "_landing/whats-new.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Display order within the articles section. Lower = appears first." }
          - { label: "Section", name: "section", widget: "hidden", default: "articles" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large heading shown above the news content." }
          - { label: "Title", name: "title", widget: "string", hint: "Section label shown in the header." }
          - { label: "Empty Message", name: "empty_message", widget: "string", required: false, hint: "Fallback text shown when no news items exist." }
          - label: "Link"
            name: "link"
            widget: "object"
            hint: "Text link shown below the news grid (e.g. 'View All News')."
            fields:
              - { label: "Text", name: "text", widget: "string" }
          - label: "Featured"
            name: "featured"
            widget: "object"
            hint: "Main spotlight story shown at the top of the section."
            fields:
              - { label: "Image", name: "image", widget: "image", hint: "Filename must not start with an underscore" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Items"
            name: "items"
            widget: "list"
            hint: "Secondary news cards shown in a grid below the featured story."
            fields:
              - { label: "Image", name: "image", widget: "image", hint: "Filename must not start with an underscore" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
      - name: "magazine"
        label: "Our Magazine"
        file: "_landing/magazine.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Display order within the articles section. Lower = appears first." }
          - { label: "Section", name: "section", widget: "hidden", default: "articles" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large heading shown above the magazine content." }
          - { label: "Title", name: "title", widget: "string", hint: "Section label shown in the header." }
          - { label: "Image", name: "image", widget: "image", hint: "Magazine cover photo displayed in the section. Filename must not start with an underscore" }
          - { label: "Alt Text", name: "alt", widget: "string", hint: "Alt text for the magazine cover image." }
          - { label: "Description", name: "description", widget: "text", hint: "Body text shown beside the magazine cover." }
          - label: "Links"
            name: "links"
            widget: "list"
            hint: "Buttons rendered below the description (e.g. 'View Latest Issue', 'Browse Previous Issues')."
            fields:
              - { label: "Text", name: "text", widget: "string" }
      - name: "weddings"
        label: "Weddings & Private Events"
        file: "_landing/weddings.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Display order within the articles section. Lower = appears first." }
          - { label: "Section", name: "section", widget: "hidden", default: "articles" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large heading shown above the weddings content." }
          - { label: "Title", name: "title", widget: "string", hint: "Section label shown in the header." }
          - { label: "Description", name: "description", widget: "text", hint: "Body text shown below the image collage." }
          - label: "Images"
            name: "images"
            widget: "list"
            hint: "3-photo collage layout."
            fields:
              - { label: "Image", name: "image", widget: "image", hint: "Filename must not start with an underscore" }
              - { label: "Alt", name: "alt", widget: "string" }
          - label: "Link"
            name: "link"
            widget: "object"
            hint: "Text link shown below the section (e.g. 'Explore Weddings & Events')."
            fields:
              - { label: "Text", name: "text", widget: "string" }
      - name: "filming"
        label: "Filming & Photography Permits"
        file: "_landing/filming.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Display order within the articles section. Lower = appears first." }
          - { label: "Section", name: "section", widget: "hidden", default: "articles" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large heading shown above the filming content." }
          - { label: "Title", name: "title", widget: "string", hint: "Section label shown in the header." }
          - { label: "Image", name: "image", widget: "image", hint: "Feature image displayed in the section. Filename must not start with an underscore" }
          - { label: "Alt Text", name: "alt", widget: "string", hint: "Alt text for the feature image." }
          - { label: "Description", name: "description", widget: "text", hint: "Body text shown beside or below the image." }
          - label: "Link"
            name: "link"
            widget: "object"
            hint: "Text link / CTA button shown below the description."
            fields:
              - { label: "Text", name: "text", widget: "string" }
      - name: "lost_and_found"
        label: "Lost Something?"
        file: "_landing/lost-and-found.md"
        media_folder: "/assets/images/landing"
        public_folder: "/assets/images/landing"
        fields:
          - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Display order within the articles section. Lower = appears first." }
          - { label: "Section", name: "section", widget: "hidden", default: "articles" }
          - { label: "Heading", name: "heading", widget: "string", hint: "Large heading shown above the section." }
          - { label: "Title", name: "title", widget: "string", hint: "Section label shown in the header." }
          - { label: "Description", name: "description", widget: "text", hint: "Informational text shown below the heading (location and contact details)." }

  - name: "map_content"
    label: "Map"
    files:
      - name: "map_points"
        label: "Map Labels & Text"
        file: "_data/map_points.yml"
        fields:

          # ── Sidebar UI ──────────────────────────────────────────────────────
          - label: "Sidebar UI Text"
            name: "ui"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Search field label (screen reader)", name: "search_label", widget: "string" }
              - { label: "Search placeholder", name: "search_placeholder", widget: "string" }
              - { label: "No results message", name: "no_results", widget: "string" }
              - { label: "Stores heading", name: "stores_heading", widget: "string" }
              - { label: "Show All button", name: "show_all", widget: "string" }
              - { label: "Category: Shops", name: "category_shops", widget: "string" }
              - { label: "Category: Galleries", name: "category_galleries", widget: "string" }
              - { label: "Category: Food & Beverage", name: "category_food", widget: "string" }
              - { label: "Legend group: Restrooms", name: "legend_restrooms", widget: "string" }
              - { label: "Legend group: Parking", name: "legend_parking", widget: "string" }
              - { label: "Legend group: Amenities", name: "legend_amenities", widget: "string" }
              - { label: "Legend group: Transport", name: "legend_transport", widget: "string" }
              - { label: "Legend group: Entrances", name: "legend_navigation", widget: "string" }
              - { label: "Legend group: Landmarks", name: "legend_landmarks", widget: "string" }
              - label: "Location Button — Toast Messages"
                name: "locate_msgs"
                widget: "object"
                collapsed: true
                hint: "These messages appear as small pop-up notifications when a visitor uses the 'Show my location' button on the map. Edit them to match the voice and language of the site."
                fields:
                  - { label: "Outside village area", name: "locate_outside_area", widget: "string", hint: "Shown when the visitor's GPS position is outside the Tlaquepaque village boundary." }
                  - { label: "Location permission denied", name: "locate_permission_denied", widget: "string", hint: "Shown when the visitor's browser or device has blocked location access. Should guide them to fix it." }
                  - { label: "Request timed out", name: "locate_timeout", widget: "string", hint: "Shown when GPS takes too long to respond (over 8 seconds)." }
                  - { label: "General location error", name: "locate_error", widget: "string", hint: "Shown for any other geolocation failure not covered above." }

          # ── Area Labels (shown on map polygons) ─────────────────────────────
          - label: "Area Labels"
            name: "areas"
            widget: "object"
            collapsed: true
            hint: "Text displayed directly on the map over named areas. Overrides GeoJSON data."
            fields:
              - { label: "Wind Sculpture Garden", name: "wind-sculpture-garden", widget: "string" }
              - { label: "El Pasillo Pequeño", name: "el-pasillo-pequeno", widget: "string" }
              - { label: "Patio de las Campanas", name: "patio-de-las-campanas", widget: "string" }
              - { label: "Patio de la Capilla", name: "patio-de-la-capila", widget: "string" }
              - { label: "Patio del Norte", name: "patio-del-norte", widget: "string" }
              - { label: "Avenida de la Constitución", name: "avenida-de-la-constitution", widget: "string" }
              - { label: "Soldier Wash Walkway", name: "soldier-wash-walkway", widget: "string" }
              - { label: "Calle Miller", name: "calle-miller", widget: "string" }
              - { label: "Calle Independencia", name: "calle-independencia", widget: "string" }
              - { label: "Patio Azul", name: "patio-azul", widget: "string" }

          # ── Point Types — default titles & descriptions ──────────────────────
          - label: "Point Types (defaults)"
            name: "types"
            widget: "object"
            collapsed: true
            hint: "Default title and popup description for each marker type. Individual points below can override these."
            fields:
              - label: "Restroom"
                name: "restroom"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Accessible Restroom"
                name: "handicap-restroom"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Accessible Bathroom"
                name: "handicap-bathroom"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Parking"
                name: "parking"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Accessible Parking"
                name: "parking-handicap"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Bike Rack"
                name: "bike-rack"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Fountain"
                name: "fountain"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Drinking Water"
                name: "drinking-water"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "ATM"
                name: "atm"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Information"
                name: "information"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Entrance"
                name: "entrance"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Elevator"
                name: "elevator"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Shuttle Stop"
                name: "bus-stop"
                widget: "object"
                fields:
                  - { label: "Title (singular)", name: "title", widget: "string" }
                  - { label: "Title (plural)", name: "title_plural", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Bell Tower"
                name: "bell-tower"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Wind Sculpture Garden"
                name: "wind-sculpture-garden"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }

          # ── Individual Points — override defaults above ───────────────────────
          - label: "Individual Points (overrides)"
            name: "points"
            widget: "object"
            collapsed: true
            hint: "Per-location title and description. These override the type defaults above."
            fields:
              - label: "Restrooms — North"
                name: "restroom-north"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Restrooms — South"
                name: "restroom-south"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Restrooms — Central"
                name: "restroom-central"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Restrooms — West"
                name: "restroom-west"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Accessible Restroom — North"
                name: "handicap-bathroom-1"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Accessible Restroom — South"
                name: "handicap-bathroom"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Shuttle Stop — North"
                name: "tlaque-paque-north"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Shuttle Stop — South"
                name: "tlaque-paque-south"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Entrance — North"
                name: "entrance-north"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Entrance — South"
                name: "entrance-south"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Entrance — West"
                name: "entrance-west"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Main Gate"
                name: "entrance-main-gate"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Fountain — Patio del Norte"
                name: "patio-del-norte"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Fountain — Plaza de la Fuente"
                name: "plaza-de-la-fuente"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Popup description", name: "description", widget: "string" }
              - label: "Fountain — Campanas"
                name: "fountain-3"
