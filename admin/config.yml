backend:
  name: github
  repo: activebridge/tlaq
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "shops"
    label: "Shops"
    folder: "_shops"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Suite", name: "suite", widget: "string", required: false, hint: "e.g. a208 — places the map pin on the building automatically" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Coordinates", name: "coordinates", widget: "string", required: false, hint: "Format: -111.76260, 34.86350. Optional if Suite is set." }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Facebook", name: "facebook", widget: "string", required: false }
      - { label: "Full Location", name: "full_location", widget: "string", required: false }
      - label: "Store Hours"
        name: "store_hours"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Monday", name: "monday", widget: "string", required: false }
          - { label: "Tuesday", name: "tuesday", widget: "string", required: false }
          - { label: "Wednesday", name: "wednesday", widget: "string", required: false }
          - { label: "Thursday", name: "thursday", widget: "string", required: false }
          - { label: "Friday", name: "friday", widget: "string", required: false }
          - { label: "Saturday", name: "saturday", widget: "string", required: false }
          - { label: "Sunday", name: "sunday", widget: "string", required: false }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "foods"
    label: "Food & Dining"
    folder: "_foods"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Suite", name: "suite", widget: "string", required: false, hint: "e.g. a208 — places the map pin on the building automatically" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Coordinates", name: "coordinates", widget: "string", hint: "Format: -111.76260, 34.86350. Optional if Suite is set.", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Facebook", name: "facebook", widget: "string", required: false }
      - { label: "Full Location", name: "full_location", widget: "string", required: false }
      - label: "Store Hours"
        name: "store_hours"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Monday", name: "monday", widget: "string", required: false }
          - { label: "Tuesday", name: "tuesday", widget: "string", required: false }
          - { label: "Wednesday", name: "wednesday", widget: "string", required: false }
          - { label: "Thursday", name: "thursday", widget: "string", required: false }
          - { label: "Friday", name: "friday", widget: "string", required: false }
          - { label: "Saturday", name: "saturday", widget: "string", required: false }
          - { label: "Sunday", name: "sunday", widget: "string", required: false }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "galleries"
    label: "Galleries"
    folder: "_galleries"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Suite", name: "suite", widget: "string", required: false, hint: "e.g. a208 — places the map pin on the building automatically" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Coordinates", name: "coordinates", widget: "string", hint: "Format: -111.76260, 34.86350. Optional if Suite is set.", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Facebook", name: "facebook", widget: "string", required: false }
      - { label: "Full Location", name: "full_location", widget: "string", required: false }
      - label: "Store Hours"
        name: "store_hours"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Monday", name: "monday", widget: "string", required: false }
          - { label: "Tuesday", name: "tuesday", widget: "string", required: false }
          - { label: "Wednesday", name: "wednesday", widget: "string", required: false }
          - { label: "Thursday", name: "thursday", widget: "string", required: false }
          - { label: "Friday", name: "friday", widget: "string", required: false }
          - { label: "Saturday", name: "saturday", widget: "string", required: false }
          - { label: "Sunday", name: "sunday", widget: "string", required: false }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "weddings"
    label: "Weddings"
    folder: "_weddings"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Suite", name: "suite", widget: "string", required: false }
      - { label: "Coordinates", name: "coordinates", widget: "string", hint: "Format: -111.76260, 34.86350", required: false }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "events"
    label: "Events"
    folder: "_events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Published", name: "published", widget: "boolean", default: true, hint: "If false, the event will not be shown on the calendar or website." }
      - { label: "Starts At", name: "starts_at", widget: "datetime" }
      - { label: "Ends At", name: "ends_at", widget: "datetime", required: false, hint: "Usually same date as Starts At with a later end time. For Schedule Type: 'range', this is required and defines the from-to span end." }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Subtitle", name: "subtitle", widget: "text" }
      - { label: "Schedule Type", name: "schedule_type", widget: "select", options: ["single", "range", "weekly", "monthly", "yearly"], required: true, hint: "single: one date; range: daily from start to end; weekly: selected weekdays until Recurrence Until; monthly: first selected weekday(s) each month until Recurrence Until; yearly: same date each year." }
      - { label: "Recurrence Until", name: "recurs_until", widget: "datetime", required: false, hint: "Use for weekly/monthly only. Leave empty for single/range/yearly." }
      - { label: "Recurrence Weekdays", name: "recurrence_weekdays", widget: "select", multiple: true, required: false, options: ["sun", "mon", "tue", "wed", "thu", "fri", "sat"], hint: "Use for weekly/monthly only. Leave empty for single/range/yearly." }
      - label: "Schedule"
        name: "schedule"
        widget: "list"
        required: false
        collapsed: true
        fields:
          - { label: "Location", name: "location", widget: "string" }
          - label: "Performances"
            name: "performances"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
      - label: "Map"
        name: "map"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Button Label", name: "button_label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - label: "Video"
        name: "video"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Video URL", name: "video_url", widget: "string", required: false }
      - { label: "Phone", name: "phone", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Facebook", name: "facebook", widget: "string", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "landing"
    label: "Landing Sections"
    files:
      - name: "banner"
        label: "Banner"
        file: "_landing/banner.md"
        fields: &landing_fields
          - { label: "Order", name: "order", widget: "number", value_type: "int" }
          - { label: "Section", name: "section", widget: "select", options: ["banner", "articles", "footer"] }
          - { label: "Heading", name: "heading", widget: "string", required: false }
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Icon", name: "icon", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Image", name: "image", widget: "image", required: false }
          - { label: "Alt Text", name: "alt", widget: "string", required: false }
          - { label: "Empty Message", name: "empty_message", widget: "string", required: false }
          - label: "Button"
            name: "button"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Link"
            name: "link"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Text", name: "text", widget: "string" }
          - label: "Links"
            name: "links"
            widget: "list"
            required: false
            fields:
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Text", name: "text", widget: "string" }
          - label: "Featured"
            name: "featured"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Items"
            name: "items"
            widget: "list"
            required: false
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Width", name: "width", widget: "number", required: false }
              - { label: "Height", name: "height", widget: "number", required: false }
          - label: "Images"
            name: "images"
            widget: "list"
            required: false
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }
              - { label: "Width", name: "width", widget: "number" }
              - { label: "Height", name: "height", widget: "number" }
      - name: "village_map"
        label: "Village Map"
        file: "_landing/village-map.md"
        fields: *landing_fields
      - name: "calendar"
        label: "Calendar"
        file: "_landing/calendar.md"
        fields: *landing_fields
      - name: "whats_new"
        label: "What's New"
        file: "_landing/whats-new.md"
        fields: *landing_fields
      - name: "magazine"
        label: "Our Magazine"
        file: "_landing/magazine.md"
        fields: *landing_fields
      - name: "weddings"
        label: "Weddings & Private Events"
        file: "_landing/weddings.md"
        fields: *landing_fields
      - name: "filming"
        label: "Filming & Photography Permits"
        file: "_landing/filming.md"
        fields: *landing_fields
      - name: "awards"
        label: "Awards"
        file: "_landing/awards.md"
        fields: *landing_fields

  - name: "pages"
    label: "Pages"
    files:
      - name: "about"
        label: "About"
        file: "pages/about.html"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Content", name: "body", widget: "code", default_language: "html" }
      - name: "accessibility"
        label: "Accessibility"
        file: "pages/accessibility.html"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Content", name: "body", widget: "code", default_language: "html" }
      - name: "family_and_pet"
        label: "Family & Pet"
        file: "pages/family_and_pet.html"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Content", name: "body", widget: "code", default_language: "html" }
      - name: "history"
        label: "History"
        file: "_data/history.yml"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Hero Image", name: "hero_banner", widget: "image" }
          - { label: "Video Cover", name: "video_cover", widget: "image" }
          - label: "Vision Section"
            name: "vision"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Collage Images"
            name: "collage"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "image_alt", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
              - { label: "Quote", name: "quote", widget: "string", required: false }
      - name: "hours"
        label: "Hours & Locations"
        file: "_data/hours.yml"
        fields:
          - label: "Jump To Links"
            name: "jump_to_links"
            widget: "object"
            fields:
              - label: "Hours"
                name: "hours"
                widget: "object"
                fields:
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "ID", name: "id", widget: "string" }
              - label: "Locations"
                name: "locations"
                widget: "object"
                fields:
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "ID", name: "id", widget: "string" }
              - label: "Village Map"
                name: "village_map"
                widget: "object"
                fields:
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "ID", name: "id", widget: "string" }
          - label: "Village Hours"
            name: "village_hours"
            widget: "object"
            fields:
              - { label: "Monday", name: "monday", widget: "string" }
              - { label: "Tuesday", name: "tuesday", widget: "string" }
              - { label: "Wednesday", name: "wednesday", widget: "string" }
              - { label: "Thursday", name: "thursday", widget: "string" }
              - { label: "Friday", name: "friday", widget: "string" }
              - { label: "Saturday", name: "saturday", widget: "string" }
              - { label: "Sunday", name: "sunday", widget: "string" }
          - label: "Notes"
            name: "notes"
            widget: "object"
            fields:
              - { label: "Restaurants", name: "restaurants", widget: "string" }
              - { label: "Holidays", name: "holidays", widget: "string" }
              - { label: "Village Map", name: "village_map", widget: "text" }
          - label: "Locations"
            name: "locations"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Google Maps URL", name: "maps_url", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Accessibility"
            name: "accessibility"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
          - label: "Family Friendly"
            name: "family_friendly"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
      - name: "hours_defaults"
        label: "Default Store Hours"
        file: "_data/store/hours_defaults.yml"
        fields:
          - label: "Monday"
            name: "monday"
            widget: "list"
            field: { label: "Time", name: "time", widget: "string" }
          - label: "Tuesday"
            name: "tuesday"
            widget: "list"
            field: { label: "Time", name: "time", widget: "string" }
          - label: "Wednesday"
            name: "wednesday"
            widget: "list"
            field: { label: "Time", name: "time", widget: "string" }
          - label: "Thursday"
            name: "thursday"
            widget: "list"
            field: { label: "Time", name: "time", widget: "string" }
          - label: "Friday"
            name: "friday"
            widget: "list"
            field: { label: "Time", name: "time", widget: "string" }
          - label: "Saturday"
            name: "saturday"
            widget: "list"
            field: { label: "Time", name: "time", widget: "string" }
          - label: "Sunday"
            name: "sunday"
            widget: "list"
            field: { label: "Time", name: "time", widget: "string" }
      - name: "parking"
        label: "Parking"
        file: "_data/parking.yml"
        fields:
          - { label: "Hero Image", name: "hero_banner", widget: "image" }
          - label: "Notes"
            name: "notes"
            widget: "object"
            fields:
              - { label: "General", name: "general", widget: "text" }
              - { label: "Visitors Only", name: "visitors_only", widget: "string" }
          - label: "Parking Lots"
            name: "lots"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Note", name: "note", widget: "string", required: false }
              - { label: "Map URL", name: "map_url", widget: "string", required: false }
          - label: "Oversized Vehicles"
            name: "oversized"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - label: "Vehicles"
                name: "vehicles"
                widget: "list"
                field: { label: "Vehicle", name: "vehicle", widget: "string" }
          - label: "Shuttle"
            name: "shuttle"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Boarding", name: "boarding", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Link Text", name: "link_text", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
      - name: "village_map"
        label: "Village Map"
        file: "pages/village_map.html"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Layout Type", name: "layout_type", widget: "hidden", default: "village_map" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Content", name: "body", widget: "code", default_language: "html" }
      - name: "weddings"
        label: "Weddings"
        file: "_data/weddings.yml"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Weddings Label", name: "weddings", widget: "string" }
          - { label: "Venues Label", name: "venues", widget: "string" }
          - { label: "Hero Image", name: "hero_banner", widget: "image" }
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Video URL", name: "video_url", widget: "string" }
          - label: "Brochure"
            name: "brochure"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Brochure URL", name: "brochure_url", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Corporate & Private Events"
            name: "events"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Brochure URL", name: "brochure_url", widget: "string" }
          - label: "Buttons"
            name: "buttons"
            widget: "object"
            fields:
              - { label: "Learn More", name: "learn_more", widget: "string" }
              - { label: "Explore More", name: "explore_more", widget: "string" }
              - { label: "FAQ", name: "faq", widget: "string" }
              - { label: "Download Brochure", name: "download_brochure", widget: "string" }
              - { label: "Submit Inquiry", name: "inquiry_submit", widget: "string" }
              - { label: "Download Site Plan", name: "download_site_plan", widget: "string" }
          - label: "Jump To Links"
            name: "jump_to_links"
            widget: "object"
