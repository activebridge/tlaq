                  - { label: "Image", name: "image", widget: "image", hint: "Photo for this collage slot. Filename must not start with an underscore" }
                  - { label: "Alt Text", name: "alt", widget: "string", hint: "Short description for screen readers and SEO. Describe what's in the photo." }
              - label: "Footnotes"
                name: "footnotes"
                widget: "list"
                hint: "Numbered citations shown beneath the body text. Each item gets an automatic '1)', '2)', etc."
                field: { label: "Footnote", name: "footnote", widget: "string", hint: "Caption or source note for one of the images / facts above." }
          - label: "Stories"
            name: "stories"
            widget: "list"
            hint: "Additional story blocks rendered after the Vision section. Odd-positioned blocks (1st, 3rd…) render with the collage on the left; even blocks render with the text on the left."
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "URL anchor for this block (e.g. 'inspiration'). Lowercase, hyphenated, no spaces." }
              - { label: "Label", name: "label", widget: "string", hint: "Rotated vertical label shown in the text column (e.g. 'INSPIRATION'). Keep short, uppercase." }
              - { label: "Decorative Image Behind Text", name: "background", widget: "image", hint: "Shown faded (≈25% opacity) behind the text column as a soft backdrop — not the main photo. Pick something atmospheric; fine details will not be readable. Filename must not start with an underscore" }
              - { label: "Text", name: "text", widget: "text", hint: "Body copy. Separate paragraphs with a blank line — they render as distinct paragraphs." }
              - label: "Images"
                name: "images"
                widget: "list"
                hint: "Collage for this block. First image renders wide on top, next two render side-by-side underneath. Use 3 images for the intended layout."
                fields:
                  - { label: "Image", name: "image", widget: "image", hint: "Photo for this collage slot. Filename must not start with an underscore" }
                  - { label: "Alt Text", name: "alt", widget: "string", hint: "Short description for screen readers and SEO. Describe what's in the photo." }
              - label: "Footnotes"
