title: FAQ
hero_banner: "assets/images/weddings/wedding_faq.webp"
blocks:
  - title: What kind of deposit do I need to secure a date? 
    content: We require payment in full in order to hold and secure your wedding date.
  - title: Can my pet be a part of the wedding?
    content: Absolutely.
  - title: Is a wedding planner required?
    content: No, but it is highly recommended. If not a full service wedding planner, a "day of the event planner" is also recommended.
  - title: Are there vendor restrictions?
    content: Yes, there is a list of required vendors that need to be used - Caterer, Florist and Rental Company.
  - title: Can we bring in our own alcohol?
    content: Yes, provided that you have a licensed and insured bartender serving all drinks, you will be charged a $300.00 corkage fee.
  - title: Are tables and chairs included in the rental fee?
    content: No, the rental fee includes the space rental, Portofino string lights , ceremony attendant and the wedding peal after the proclamation.
  - title: What happens in inclement weather?
    content: The client would need to rent a tent.
  - title: Do you offer military discounts?
    content: Yes, with proof we offer a 10% discount.
  - title: Can we use sparklers at our event?
    content: Sparklers may be used with prior approval due to local fire restrictions.
  - title: Are there restrictions on aplified music?
    content: There is a Sedona ordinance which limits amplified music; it must be turned off at 10:00 p.m.
