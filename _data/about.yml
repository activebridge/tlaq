heading: "A celebrated arts and shopping village in the heart of Sedona."
subheading: "A unique destination where curated outdoor art, seasonal landscaping, a rich heritage, and artisan culture can be experienced throughout the village."

hero_banner: assets/images/about/hero.png

history:
  title: The History of Tlaquepaque
  description: "From its architectural inspiration to artistic tradition, learn about the vision behind our village that continues today."
  image: assets/images/about/history.png
  button_text: "Learn More"
  button_url: "/history"

village_map:
  description: "Our interactive village map provides easy navigation to all shops, galleries, and restaurants, helping you discover every corner of Tlaquepaque North and South during your visit."

