sections:
  tlaquepaque_north:
    heading: Tlaquepaque North
    description: "Don't forget to visit Tlaquepaque North, across the street on the north side of Sedona's Highway 179. Since opening in 2016, this enchanting extension has captured the same timeless charm and elegance as the original village you are standing in now."
    images:
      - assets/images/about/tlaquepaque-north.png
  outdoor_art:
    heading: Outdoor Art
    description: "Wander the village to discover the collection of outdoor sculptures and art installations. Permanent pieces like Kim Kori's beloved frog have become village landmarks, while rotating displays showcase new works. This outdoor gallery transforms your stroll through the village into an artistic journey of unexpected discoveries."
    button:
      text: Have You Seen These?
      url: /outdoor-art
    images:
      - assets/images/about/outdoor-art.png
  landscaping:
    heading: Landscaping
    description: "Don't miss Tlaquepaque's carefully curated seasonal landscaping, where vibrant gardens and thoughtful design create an enchanting atmosphere year-round for every visitor."
    images:
      - assets/images/about/landscaping.png
  sycamore:
    heading: Sycamore
    description: "Tlaquepaque's majestic sycamores, originally preserved by Abe Miller, shade the village's cobblestone walkways and courtyards. These trees are integral to the property's identity. They are living landmarks that form the foundation of the landscape. A dedicated team maintains their beauty year-round."
    images:
      - assets/images/about/sycamore.png
  our_people:
    heading: Our People
    description: "It takes a village to run a village. Our team of talented individuals comes together to make Tlaquepaque a special, unique destination to visit."
    images:
      - assets/images/about/our-people.png
