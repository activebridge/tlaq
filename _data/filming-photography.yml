title: Filming & Photography
subtitle: A distinctive setting for professional photography and filming
hero_banner: "assets/images/filming/filming-photography.webp"
intro: From intimate portraits and engagements to editorial, fashion, advertising, and commercial shoots, the village’s architecture, courtyards, and natural surroundings provide a rich and inspiring backdrop.
left_column:
  - To help preserve the experience of our village guests and tenants, all professional photography and filming sessions require a permit.
  - Permit requests must be submitted at least 72 hours before the desired shoot date and are subject to availability. Additional details and requirements will be collected as part of the request process.
sections:
  - title: "Please keep in mind:"
    items:
    - Permit fees start at $200 and are based on scope, timing, and availability
    - Additional requirements may apply depending on the nature of the shoot
    - Walkways and doorways may not be blocked and gates need to remain open to allow for visitors to pass by as needed
wedding_exemption_note: Only couples getting married at Tlaquepaque as part of an approved wedding do not require a separate photo permit.
buttons:
  request_a_permit: REQUEST A PERMIT
