title: Privacy Policy
hero_banner: "assets/images/leasing/leasing.webp"

sections:
  - title: Introduction
    paragraphs:
      - "Tlaquepaque Arts & Shopping Village values privacy as part of the care we extend to our visitors, guests, and community. This Privacy Policy explains how information is collected, used, and protected when you visit our website."
      - "This policy applies solely to information collected through the Tlaquepaque website and does not apply to information collected offline or through third-party websites."

  - title: Information We Collect
    intro: "When you interact with our website, you may choose to share personal information with us, such as:"
    items:
      - Name
      - Company or business name
      - Mailing address
      - Email address
      - Phone number
      - Website address
      - Information shared through inquiries, requests, or forms
    paragraphs:
      - "We may also collect non-personal information automatically through analytics tools, including Google Analytics. This information may include browser type, device information, pages visited, and general usage patterns. It helps us understand how our site is used and how we can improve the experience."
      - "Tlaquepaque does not knowingly collect personal information from children under the age of 13."

  - title: How Information Is Used
    intro: "Information collected through the website may be used to:"
    items:
      - Respond to inquiries and requests
      - Communicate about services, events, or opportunities
      - Improve website performance, content, and usability
      - Send occasional communications when you have opted to receive them
    paragraphs:
      - "We do not sell personal information."

  - title: Sharing of Information
    paragraphs:
      - "We may share information with trusted service providers who support the operation and maintenance of our website and communications. These partners are authorized to use information only as necessary to perform services on our behalf."
      - "Our website may include links to external sites. Tlaquepaque is not responsible for the privacy practices of those websites, and we encourage visitors to review their policies independently."

  - title: Cookies & Analytics
    paragraphs:
      - "Our website uses cookies and similar technologies to support functionality and gather analytics data. You may manage cookie preferences through your browser settings."

  - title: Access, Updates & Deletion
    paragraphs:
      - "You may request access to, correction of, or deletion of your personal information by contacting us using the information below. Requests will be addressed within a reasonable timeframe."

  - title: California Privacy Rights
    paragraphs:
      - "If you are a California resident, you may have additional rights under the California Consumer Privacy Act (CCPA), as amended by the California Privacy Rights Act (CPRA). These rights may include the ability to request access to or deletion of personal information collected through this website. Tlaquepaque Arts & Shopping Village does not sell personal information. Requests related to California privacy rights may be submitted using the contact information provided below."

  - title: Data Security
    paragraphs:
      - "We take reasonable administrative and technical measures to safeguard personal information. While we strive to protect your information, no online system can be guaranteed to be entirely secure."

  - title: Contact Us
    paragraphs:
      - "If you have questions about this Privacy Policy or our data practices, please contact us:"
    contact:
      name: "Tlaquepaque Arts & Shopping Village"
      phone: "(928) 282-4838"
      email: "visitorinfo@tlaq.com"

  - title: Policy Updates
    paragraphs:
      - "This Privacy Policy may be updated periodically. Any changes will be reflected on this page with an updated effective date."

copyright: "© Tlaquepaque Arts & Shopping Village"
