title: Privacy Policy
sections:
  - title: Introduction
    content: Tlaquepaque respects each individual's right to personal privacy. We will collect and use information through our Web site only in the ways disclosed in this statement. This statement applies solely to information collected at Tlaquepaque's Web site.
  - title: Part I – Information Collection
    content: Tlaquepaque collects information through our Web site at several points. We collect the following information about primary visitors&#58; Name, Company name, Address, Email address, Phone number, Web address &amp; Descriptions of business issues. We may also collect usage data through Google Analytics and information which our customers divulge about other people, such as referrals or gift purchases. Tlaquepaque does not actively market to children, and we never knowingly ask a child under 13 to divulge personal information. We collect demographic data in order to help us in our own marketing efforts. We collect this information through a quote request &amp; contact form, Google Analytics tracking and word of mouth or email.
  - title: Part II – Information Usage
    content: The information collected by Tlaquepaque will be used for marketing purposes. Users who provide information may receive an email, phone call or opt-in email for a newsletter. The information we collect will not be used to create customer profiles based on browsing or purchasing history. We may share data with third parties involved in the consulting, creation or maintenance of the services we provide. These third parties will use the information for the consulting, creation and maintenance of the services we provide. We offer links to other Web sites. Please note&#58; when you click on links to other Web sites, we encourage you to read their privacy policies. Their standards may differ from ours.
  - title: Part III – Access to Information
    content: Users may access their own personal information and contact us about inaccuracies they may find. Users may delete their information from our database by letting us know through email or phone contact.
  - title: Part IV – Problem Resolution
    content: If problems arise, users may contact Tlaquepaque by email or phone. We are committed to resolving disputes within a reasonable time frame.
  - title: Part V – Data Storage and Security
    content: Tlaquepaque protects user information with the following security measures&#58; secure password protected servers, firewalls and other technology and procedures used to protect consumer privacy. Users may delete their information from our database by letting us know through email or phone contact and it will be deleted immediately after the message is received.
