title: Leasing
subtitle: Tlaquepaque Arts & Shopping Village is a place for makers, curators, and independent business owners who value beauty, craft, and meaningful connection.
hero_banner: "assets/images/leasing.webp"
description: More than a shopping destination, the village is a thoughtfully designed community—one where galleries, shops, and eateries collectively shape a shared sense of place, discovery, and cultural richness.<br><br>We look for tenants who reflect the care, originality, and spirit of Tlaquepaque. If you’re interested in becoming part of this enduring arts and shopping village, we invite you to begin a conversation with us.
guidelines_intro: In preparation for a leasing conversation, we share the following guidelines and requirements to help you understand our general leasing structure and what information we may request as part of the review process.
sections:
  - title: Leasing Guidelines
    items:
      - Initial 3-year lease with three additional 3-year renewal options
      - Triple Net (NNN) lease structure
      - Annual base rent escalation
      - One month's full rent is required as a security deposit
  - title: Leasing Requirements
    items:
      - Letter of Intent outlining your store or gallery concept
      - Financial statement
      - Images of products and/or examples of previously owned stores or galleries
buttons:
  inquire_about_space: INQUIRE ABOUT SPACE
