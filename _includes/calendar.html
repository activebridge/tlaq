<div class="calendar" id="calendar">
  <div class="calendar-filter">
    <select class="calendar-select" id="calendar-select" aria-label="Filter events by month"></select>
  </div>
  <div class="calendar-items" id="calendar-items"></div>
</div>

<script id="calendar-events-data" type="application/json">
  [
    {% assign calendar_events = site.events | sort: "starts_at" %}
    {% for event in calendar_events %}
      {% assign image_path = '/assets/images/' | append: event.image | prepend: '/cdn-cgi/image/width=400,height=300,fit=cover,quality=85,gravity=top,format=webp/' | prepend: site.cdn_url %}
      {
        "title": {{ event.title | jsonify }},
        "url": {{ event.url | relative_url | jsonify }},
        "starts_at": {{ event.starts_at | date: "%Y-%m-%d %H:%M:%S" | jsonify }},
        "ends_at": {{ event.ends_at | date: "%Y-%m-%d %H:%M:%S" | jsonify }},
        "subtitle": {{ event.subtitle | jsonify }},
        "image": {{ image_path | jsonify }},
        "schedule_type": {{ event.schedule_type | jsonify }},
        "recurs_until": {{ event.recurs_until | date: "%Y-%m-%d %H:%M:%S" | jsonify }},
        "recurrence_weekdays": {{ event.recurrence_weekdays | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
</script>

<script src="{{ '/assets/js/calendar.js' | relative_url }}" defer></script>
