<div class="calendar" id="calendar">
  <div class="calendar-filter">
    <select class="calendar-select" id="calendarSelect" aria-label="Filter events by month"></select>
  </div>
  <div class="calendar-items" id="calendarItems"{% if include.limit %} data-limit="{{ include.limit }}"{% endif %}></div>
</div>

<script type="application/json" id="calendarEventsData">
  [
    {% assign calendar_events = site.events | sort: "starts_at" %}
    {% for event in calendar_events %}
      {% assign desktop_image_path = event.image | prepend: '/cdn-cgi/image/width=540,height=720,fit=cover,gravity=center,format=webp/' | prepend: site.cdn_url %}
      {% assign mobile_image_path = event.image | prepend: '/cdn-cgi/image/width=300,height=400,fit=cover,gravity=center,format=webp/' | prepend: site.cdn_url %}
      {
        "title": {{ event.title | jsonify }},
        "url": {{ event.url | relative_url | jsonify }},
        "starts_at": {{ event.starts_at | date: "%Y-%m-%d %H:%M:%S" | jsonify }},
        "ends_at": {{ event.ends_at | date: "%Y-%m-%d %H:%M:%S" | jsonify }},
        "subtitle": {{ event.subtitle | jsonify }},
        "image": {{ desktop_image_path | jsonify }},
        "mobile_image": {{ mobile_image_path | jsonify }},
        "annual": {{ event.annual | jsonify }},
        "schedule_type": {{ event.schedule_type | jsonify }},
        "recurs_until": {{ event.recurs_until | date: "%Y-%m-%d %H:%M:%S" | jsonify }},
        "recurrence_weekdays": {{ event.recurrence_weekdays | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
</script>


{% assign calendar_js_version = site.time | date: "%s" %}
<script src="{{ '/assets/js/calendar.js?v=' | append: calendar_js_version | relative_url }}" defer></script>
