<style>
  @view-transition { navigation: auto; }

  ::view-transition-old(*),
  ::view-transition-new(*) {
    mix-blend-mode: normal;
  }

  ::view-transition-group(*) {
    animation-duration: 300ms;
  }

  .list-container {
    .card { flex: 1 1 500px; }
  }

  :root {
    /* Header */
    --header-height: 131px;
    --header-status-height: 33px;
    --header-nav-height: 25px;
    --layout-max-width: 1440px;
    --font-montserrat: "Montserrat", "Montserrat Fallback", sans-serif;
    --font-caslon: "Big Caslon", "Big Caslon Fallback", serif;

    /* Color palette */
    --navy: #111c4e;
    --navy-80: color-mix(in srgb, var(--navy) 80%, transparent);
    --navy-60: color-mix(in srgb, var(--navy) 60%, transparent);
    --navy-40: color-mix(in srgb, var(--navy) 40%, transparent);
    --cream: #f7ead7;
    --cream-80: color-mix(in srgb, var(--cream) 80%, transparent);
    --cream-60: color-mix(in srgb, var(--cream) 60%, transparent);
    --cream-40: color-mix(in srgb, var(--cream) 40%, transparent);
    --red: #e64b38;
    --red-80: color-mix(in srgb, var(--red) 80%, transparent);
    --red-60: color-mix(in srgb, var(--red) 60%, transparent);
    --red-40: color-mix(in srgb, var(--red) 40%, transparent);
    --orange: #f88d2b;
    --orange-80: color-mix(in srgb, var(--orange) 80%, transparent);
    --orange-60: color-mix(in srgb, var(--orange) 60%, transparent);
    --orange-40: color-mix(in srgb, var(--orange) 40%, transparent);
    --green: #008066;
    --green-80: color-mix(in srgb, var(--green) 80%, transparent);
    --green-60: color-mix(in srgb, var(--green) 60%, transparent);
    --green-40: color-mix(in srgb, var(--green) 40%, transparent);
    --blue: #1b638a;
    --blue-80: color-mix(in srgb, var(--blue) 80%, transparent);
    --blue-60: color-mix(in srgb, var(--blue) 60%, transparent);
    --blue-40: color-mix(in srgb, var(--blue) 40%, transparent);
    --pink: #d41367;
    --pink-80: color-mix(in srgb, var(--pink) 80%, transparent);
    --pink-60: color-mix(in srgb, var(--pink) 60%, transparent);
    --pink-40: color-mix(in srgb, var(--pink) 40%, transparent);
    --pink-light: #f291a6;
    --purple: #9926b7;
    --purple-light: #e4c3d2;
    --purple-80: color-mix(in srgb, var(--purple) 80%, transparent);
    --purple-60: color-mix(in srgb, var(--purple) 60%, transparent);
    --purple-40: color-mix(in srgb, var(--purple) 40%, transparent);
    --gray: #D9D9D9;
    --placeholder-bg: #e8e4df;

    /* Utility colors */
    --primary: var(--navy);
    --secondary: var(--cream);
    --bg: var(--secondary);
    --text: var(--primary);
    --secondary-text: var(--secondary);
  }

  html {
    background: var(--primary);
    scroll-padding-top: calc(var(--header-height) + var(--header-status-height) + 4rem);

    @media (max-width: 770px) {
      scroll-padding-top: calc(var(--header-height) - var(--header-nav-height) + var(--header-status-height) + 1.5rem);
    }
  }

  @font-face {
    font-family: "Montserrat";
    font-style: normal;
    font-weight: 400;
    src: url("/assets/fonts/Montserrat-Regular.woff2") format("woff2");
    font-display: swap;
  }

  @font-face {
    font-family: "Montserrat";
    font-style: normal;
    font-weight: 500;
    src: url("/assets/fonts/Montserrat-Medium.woff2") format("woff2");
    font-display: swap;
  }

  @font-face {
    font-family: "Montserrat";
    font-style: normal;
    font-weight: 600;
    src: url("/assets/fonts/Montserrat-SemiBold.woff2") format("woff2");
    font-display: swap;
  }

  @font-face {
    font-family: "Big Caslon";
    font-style: normal;
    font-weight: 500;
    src: url("/assets/fonts/BigCaslon-Medium.woff2") format("woff2");
    font-display: swap;
  }

  @font-face {
    font-family: "Montserrat Fallback";
    font-weight: 400;
    src: local("SF Pro Text"), local("SF Pro Display"), local("Segoe UI"), local("Roboto"), local("Oxygen-Sans"), local("Ubuntu"), local("Cantarell"), local("Helvetica Neue");
    size-adjust: 107.2%;
  }

  @font-face {
    font-family: "Montserrat Fallback";
    font-weight: 500;
    src: local("SF Pro Text"), local("SF Pro Display"), local("Segoe UI"), local("Roboto"), local("Oxygen-Sans"), local("Ubuntu"), local("Cantarell"), local("Helvetica Neue");
    size-adjust: 107.2%;
  }

  @font-face {
    font-family: "Big Caslon Fallback";
    font-weight: 400;
    src: local("Book Antiqua"), local("Palatino Linotype"), local("Georgia"), local("Times New Roman");
    size-adjust: 95%;
  }

html, body {
    height: 100%;
    margin: 0;
    color: var(--text);
    font-family: var(--font-montserrat);
    font-weight: 400;
    font-size: 12px;
    scroll-behavior: smooth;
  }

  body {
    display: flex;
    flex-direction: column;
    background: var(--primary);
    min-height: 100%;
    height: auto;

    &:has(:popover-open) { overflow-y: hidden; }
  }

  main {
    flex-grow: 1;
    background: var(--cream);
  }

  svg {
    display: inline-block;
    vertical-align: middle;
    width: auto;
  }

  button {
    color: inherit;
  }

  a {
    color: inherit;
    text-decoration-color: transparent;
    text-decoration-thickness: 1px;
    text-underline-offset: 0px;
    -webkit-tap-highlight-color: transparent;
    transition: text-decoration-color 0.3s, text-underline-offset 0.3s;
  }

  a:hover {
    text-underline-offset: 2px;
    text-decoration-color: inherit;
  }

  footer {
    background: var(--primary);
    color: var(--secondary);
    padding: 32px 20px 10rem 23px;
    line-height: 2rem;
    font-size: 10px;
    font-weight: 500;
    margin-bottom: -20px;
  }

  /* Critical CSS – CSS reset, typography sizes, header layout, container, landing banner.
     Prevents layout shifts while application.css loads async. */

  @media (prefers-reduced-motion: no-preference) {
    html { interpolate-size: allow-keywords; }
  }

  *, *::before, *::after { box-sizing: border-box; }
  *:not(dialog) { margin: 0; }

  body {
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  img, picture, video, canvas {
    display: block;
    max-width: 100%;
    width: 100%;
  }

  input, button, textarea, select { font: inherit; }

  p, h1, h2, h3, h4, h5, h6 { overflow-wrap: break-word; }
  h1, h2, h3, h4, h5, h6 { text-wrap: auto; }

  h1, h2, h3, h4 {
    font-family: var(--font-caslon);
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: 0.04em;
  }

  h1 { font-size: clamp(45px, 6vw, 90px); }
  h2 { font-size: clamp(28px, 4.5vw, 60px); }
  h3 { font-size: clamp(24px, 3vw, 40px); }
  h4 { font-size: clamp(18px, 3vw, 34px); }

  h5, h6 {
    font-family: var(--font-montserrat);
    line-height: 1;
  }

  h5 { font-size: clamp(20px, 2.5vw, 32px); text-transform: uppercase; }

  h6 {
    font-size: clamp(12px, 1.7vw, 20px);
    line-height: clamp(20px, 2.5vw, 40px);
  }

  p { font-size: clamp(12px, 1.7vw, 20px); }

  ul {
    font-family: var(--font-montserrat);
    font-size: clamp(12px, 1.7vw, 20px);
    line-height: clamp(20px, 2.5vw, 40px);
  }

  .container {
    padding: 0 20px;
    display: grid;
  }

  header {
    position: sticky;
    top: 0;
    padding-top: max(30px, env(safe-area-inset-top, 0px));
    text-align: center;
    background: var(--navy);
    color: var(--cream);
    z-index: 10;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    view-transition-name: header;
  }

  @media (min-width: 771px) {
    :active-view-transition { body { background: var(--cream); } }
  }

  @keyframes header-vt-pos-out {
    from {
      object-position: top center;
    }
    to {
      object-position: center center;
    }
  }

  @keyframes header-vt-pos-in {
    from {
      object-position: bottom center;
    }
    to {
      object-position: center center;
    }
  }

  ::view-transition-group(header) {
    z-index: 2;
    animation-duration: 500ms;
    animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
  }

  ::view-transition-old(header) {
    width: 100%;
    height: 100%;
    object-position: top center;
    animation: header-vt-pos-out 500ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  ::view-transition-new(header) {
    width: 100%;
    height: 100%;
    object-position: bottom center;
    animation: header-vt-pos-in 500ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  header a {
    text-decoration: none;
    color: inherit;

    svg:first-of-type {
      margin-right: 0.5rem;
    }
  }

  header a.logo {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    align-items: center;
    justify-self: center;
    margin: 2rem 1rem 1rem;
    outline: none;
    width: clamp(215px, 30vw, 347px);
    view-transition-name: logo;
  }

  ::view-transition-group(logo) {
    z-index: 2;
    animation-duration: 500ms;
    animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
  }

  header a.logo img {
    display: block;
    width: 347px;
    height: 72px;
    min-width: 215px;
    min-height: 45px;
    margin-bottom: 10px;
    object-fit: contain;
  }

  header ul.header-actions {
    display: none;
  }

  header button.nav-toggle {
    display: none;
  }

  header nav#desktop {
    height: var(--header-nav-height);
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    text-transform: uppercase;

    a,
    button#visit-popover-anchor {
      color: var(--cream);
      background: transparent;
    }

    a {
      font-size: clamp(12px, 1.7vw, 20px);
      display: inline-flex;
      gap: 0.35rem;
      padding: 1rem 0.5rem;
      align-items: center;
      flex-direction: row;
      height: var(--header-nav-height);
      text-transform: uppercase;
      white-space: nowrap;

      svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        margin-right: 0.5rem;
      }
    }

    > a {
      position: relative;

      &::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0.5rem;
        right: 0.5rem;
        height: 0;
        background: var(--cream);
        transition: height 0.25s ease;
      }

      &:hover::after,
      &[aria-current="page"]::after {
        height: 4px;
      }
    }

    button#visit-popover-anchor {
      all: unset;
      height: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      font-size: clamp(12px, 1.7vw, 20px);
      text-transform: uppercase;
      white-space: nowrap;
      anchor-name: --visit-popover-anchor;
      color: var(--cream);

      svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
    }

    div#visit-popover {
      position: absolute;
      min-width: 220px;
      padding: 0 0 10px 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate(-50%, -8px);
      top: anchor(--visit-popover-anchor bottom);
      left: anchor(--visit-popover-anchor center);

      a {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 1.5rem 1rem;
        font-size: 15px;
      }
    }
  }

  aside#status {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
    background: var(--cream);
    color: var(--navy);
    padding: 0.45rem 1rem;
    height: var(--header-status-height);
    font-size: clamp(12px, 1.7vw, 15px);
    font-weight: 500;
    width: 100%;
    margin-top: auto;
    grid-column: 1 / -1;
  }

  #weather {
    position: relative;

    img {
      width: clamp(41px, 6.1vw, 50px);
      height: 24px;
    }
  }
  .header-jump { view-transition-name: header-jump; }

  @media (max-width: 770px) {
    header {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: start;
    }

    header a.logo {
      margin: 0 2rem;
      min-width: 0;
    }

    header ul.header-actions {
      display: flex;
      list-style: none;
      margin-top: 1rem;
      padding: 0;
      justify-self: start;
      align-items: center;
    }

    header ul.header-actions li {
      display: inline-flex;
    }

    header ul.header-actions a,
    header ul.header-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--cream);
      padding: 0;
      display: inline-flex;
      align-items: center;
    }

    header ul.header-actions svg {
      width: 24px;
      height: 24px;
    }

    header button.nav-toggle {
      position: relative;
      display: inline;
      cursor: pointer;
      background: transparent;
      border: none;
      height: 28px;
      min-width: 28px;
      margin-top: 1.3rem;
      justify-self: end;
      padding: 0;
    }

    header button.nav-toggle::before,
    header button.nav-toggle::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 28px;
      height: 1px;
      background: var(--cream);
      transition: transform 180ms ease, top 180ms ease;
      transform: translateX(-50%);
    }

    header button.nav-toggle::before { top: 3px; }
    header button.nav-toggle::after  { top: 15px; }

    header nav#desktop { display: none; }

    #weather img {
      height: 19px;
    }

  }

  header a.logo,
  header button.nav-toggle,
  header ul.header-actions {
    user-select: none;
    -webkit-user-select: none;
  }

  .search-dialog {
    left: 50%;
    transform: translateX(-50%) translateY(-2rem);
    padding: 0;
    overflow: visible;
    top: var(--header-height);
    width: calc(100% - 1rem);
    max-height: calc(100dvh - var(--header-height) - 1rem);
  }

  @media (min-width: 771px) {
    .search-dialog {
      width: 50%;
      top: calc(var(--header-height) + var(--header-status-height) + 3rem);
    }
  }

  .search-close-btn {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    padding: 0.25rem;
  }

  header nav#desktop > .search-toggle-btn {
    all: unset;

    svg {
      width: 20px;
      height: 20px;
      margin-top: 5px;
    }
  }

  .search-results {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
    scrollbar-gutter: stable both-edges;
  }

  .landing-banner {
    min-height: 427px;
    height: calc(100vh - var(--header-height) - var(--header-status-height));
    position: sticky;
    top: 206px;
    overflow: hidden;
    isolation: isolate;
    background-color: var(--navy-40);

    @media (max-width: 770px) { top: 145px; }

    img.banner-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    &::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      border-image: fill 1 linear-gradient(#0000005d);
    }

    &::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: var(--cream);
      opacity: 1;
    }

    video.videobgframe {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      width: max(100%, calc(100vh * 16 / 9));
      height: max(100%, calc(100vw * 9 / 16));
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s;
      background: transparent;

      &.loaded { opacity: 1; }
    }

    h1 {
      width: 100%;
      text-align: center;
      position: absolute;
      top: 50%;
      z-index: 2;
      color: var(--cream);

    }

    a.btn {
      position: absolute;
      top: calc(50% + 5rem);
      left: 50%;
      transform: translate(-50%, 0);
      z-index: 2;
      display: inline-block;
      white-space: nowrap;
      padding: 12px 24px;
      color: var(--cream);
      border: 1px solid var(--cream);
      text-transform: uppercase;
      text-decoration: none;
      font-size: 1.333rem;
      letter-spacing: 0.03em;
      line-height: 1.375;
      border-radius: 3px;

      &:hover {
        background: var(--cream);
        color: var(--navy);
      }

      &:active, &:focus-visible { outline-color: var(--cream); }
    }
  }

  .landing-nav {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: clamp(144px, 25vw + 24px, 314px);
    padding-top: 17px;
    padding-bottom: clamp(2rem, 6vw, 5rem);
    position: relative;
    background: var(--cream);

    @media (max-width: 770px) { grid-template-columns: repeat(2, 1fr); }

    a {
      --category-overlay: var(--navy-80);

      display: flex;
      justify-content: center;
      align-items: stretch;
      flex-direction: column;
      position: relative;
      overflow: clip;
      text-decoration: none;
      color: var(--cream);
      gap: 1rem;
      text-align: center;
      letter-spacing: 0.08em;
      padding: clamp(0.75rem, 1.5vw, 1.25rem) clamp(0.5rem, 2vw, 1.5rem);
      transform: translateZ(0);
      background: color-mix(in srgb, var(--bg-color) 40%, var(--cream));
      transition: background 500ms ease;

      img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 500ms ease;
        filter: saturate(0.9);
        z-index: 0;
        transform: scale(1.05);
        transition: transform 500ms ease, filter 500ms ease, opacity 500ms ease;

        &.loaded { opacity: 0.35; }
      }

      h5, p {
        display: block;
        z-index: 2;
        color: var(--cream);
        margin: 0;
        width: 100%;
        transition: transform 500ms ease, margin 500ms ease;
      }

      p {
        font-size: clamp(12px, 2vw, 22px);
        font-weight: 500;
        overflow: hidden;
      }

      &:hover,
      &:focus-visible {
        img {
          transform: scale(1.12) translateY(-6px);
          filter: saturate(1.05);
        }

        &::before { opacity: 0.9; }

        h5, p {
          transform: scale(1.3);
          margin: 0.3rem;
        }
      }

      &::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--category-overlay);
        z-index: 1;
        transition: opacity 500ms ease;
      }

      div {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 1rem;
        top: calc(var(--header-height) + var(--header-status-height));
        padding: 1rem 0;
        z-index: 1;
      }

      &:has(img.loaded) { background: var(--bg-color); }

      &.shops-link       { background: color-mix(in srgb, var(--pink)    40%, var(--cream)); --bg-color: var(--pink);   --category-overlay: var(--pink-40); }
      &.foods-link       { background: color-mix(in srgb, var(--orange)  40%, var(--cream)); --bg-color: var(--orange); --category-overlay: var(--orange-40); }
      &.galleries-link   { background: color-mix(in srgb, var(--blue)    40%, var(--cream)); --bg-color: var(--blue);   --category-overlay: var(--blue-40); }
      &.events-link      { background: color-mix(in srgb, var(--purple)  40%, var(--cream)); --bg-color: var(--purple); --category-overlay: var(--purple-40); }
      &.village-map-link { background: color-mix(in srgb, var(--navy)    40%, var(--cream)); --bg-color: var(--navy);   --category-overlay: var(--navy-40); }
      &.weddings-link    {
        --bg-color: var(--pink-light);
        --category-overlay: color-mix(in srgb, var(--pink-light) 40%, transparent);
        background: color-mix(in srgb, var(--pink)    20%, var(--cream));
        h5 { background: none; padding: 0; }
      }
    }
  }

  /* CONTENT WRAPPER & UTILITIES */

  .content-wrapper {
    display: grid;
    max-width: 1440px;
    margin: 0 auto;
    padding: 2rem clamp(1.5rem, 4vw, 3rem);
    position: relative;
    background: var(--cream);
    box-shadow: 0 0 0 100vmax var(--cream);
    clip-path: inset(0 -100vmax);
    gap: 1.5rem;
  }

  #mapContainer {
    width: 100%;
    height: 500px;
    position: relative;
  }

  .hero {
    height: calc(100vh - 210px);
    position: sticky;
    top: 206px;
    opacity: 1;
    overflow: hidden;

    img {
      height: 100%;
      object-fit: cover;
      filter: blur(4px);
      transition: filter 0.2s ease;
    }

    img.loaded {
      filter: blur(0);
      transform: scale(1);
    }
    @media (max-width: 770px) { top: 145px; }
  }

  @keyframes hero-fade-out {
    to { opacity: 0; }
  }

  @keyframes header-collapse {
    from { padding-top: max(30px, env(safe-area-inset-top, 0px)); }
    to   { padding-top: env(safe-area-inset-top, 0px); }
  }

  @keyframes hero-reveal {
    from { height: 0; }
    to { height: 100%; }
  }
