{% assign village_map = site.landing | where: "slug", "village-map" | first %}
<article id="{{ village_map.slug }}">
  <h5>
    {% include {{ village_map.icon }} %}
    {{ village_map.title }}
  </h5>
  <h2>{{ village_map.heading }}</h2>
  <iframe src="{{ '/map_embed' | relative_url }}" loading="lazy" title="Village Map" style="width:100%;height:500px;border:none" allowfullscreen></iframe>
  <section class="footer">
    <h6>{{ village_map.description | escape }}</h6>
  </section>
</article>
