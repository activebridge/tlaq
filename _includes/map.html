{% comment %}Build store data as JSON from all collections{% endcomment %}
{% assign all_stores = site.shops | concat: site.galleries | concat: site.foods %}

<style>
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .map-container {
    position: relative;
    width: 100%;
    height: 500px;
    overflow: hidden;
  }

  #mapSidebar {
    position: absolute;
    top: 0;
    left: 0;
    width: 260px;
    height: 100%;
    background: white;
    border-right: 1px solid var(--cream-60);
    box-shadow: 2px 0 8px rgba(0, 0, 0, 0.15);
    clip-path: inset(0 -8px 0 0);
    overflow-y: auto;
    font-family: "Montserrat", sans-serif;
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 4;
    scrollbar-width: thin;
    scrollbar-color: var(--cream-60) transparent;
    transform: translateX(0);
    opacity: 1;
  }

  #mapSidebar::-webkit-scrollbar { width: 4px; }
  #mapSidebar::-webkit-scrollbar-thumb {
    background: var(--cream-60);
    border-radius: 2px;
  }
  #mapSidebar::-webkit-scrollbar-track { background: transparent; }

  #mapSidebar.collapsed {
    transform: translateX(-100%);
    opacity: 0;
    pointer-events: none;
  }

  #mapSidebar.hidden {
    transform: translateX(-100%);
    opacity: 0;
    transition: none;
  }

  #mapSidebarToggle {
    position: absolute;
    top: 10px;
    left: 270px;
    z-index: 5;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: white;
    border: none;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--navy);
    transition: left 0.3s ease, transform 0.2s ease, opacity 0.3s ease;
    opacity: 1;
  }

  #mapSidebarToggle.hidden {
    opacity: 0;
    transition: none;
  }

  #mapSidebarToggle:hover { transform: scale(1.05); }
  .map-container.sidebar-collapsed #mapSidebarToggle { left: 10px; }

  #mapSidebarToggle svg {
    width: 16px;
    height: 16px;
    transition: transform 0.3s ease;
  }

  .map-container.sidebar-collapsed #mapSidebarToggle svg { transform: rotate(180deg); }

  .sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--cream-60);
    position: sticky;
    top: 0;
    background: white;
    z-index: 1;
  }

  .sidebar-search input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--cream-60);
    border-radius: 6px;
    font-family: "Montserrat", sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--navy);
    background: white;
    text-align: left;
    text-transform: none;
    letter-spacing: normal;
    outline: none;
    box-sizing: border-box;
  }

  .sidebar-search input:focus { border-color: var(--navy-60); }
  .sidebar-search input::placeholder { color: var(--navy-60); }

  .sidebar-category,
  .sidebar-back,
  .sidebar-show-all {
    display: flex;
    align-items: center;
    border: none;
    background: none;
    font: inherit;
    color: var(--navy);
    text-align: left;
    width: 100%;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .sidebar-category:hover,
  .sidebar-back:hover,
  .sidebar-show-all:hover,
  .sidebar-result:hover {
    background: var(--cream-60);
  }

  .sidebar-back {
    display: none;
    gap: 6px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy-60);
    border-bottom: 1px solid var(--cream-60);
    position: sticky;
    top: 52px;
    background: white;
    z-index: 1;
  }

  .sidebar-back.visible { display: flex; }
  .sidebar-back svg {
    width: 14px;
    height: 14px;
  }

  .sidebar-results {
    list-style: none;
    margin: 0;
    padding: 0;
    overflow-y: auto;
    display: none;
  }

  .sidebar-results.visible { display: block; }

  .sidebar-result {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--navy);
    border-left: 3px solid transparent;
  }

  .sidebar-result.active {
    border-left-color: var(--cat-color);
    background: var(--cream-60);
  }

  .sidebar-no-results {
    padding: 16px;
    font-size: 13px;
    color: var(--navy-60);
    text-align: center;
    display: none;
  }

  .sidebar-categories {
    padding: 8px 0;
    margin: 0;
    border: none;
    min-inline-size: 0;
  }

  .sidebar-category,
  .sidebar-show-all {
    gap: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
  }

  .sidebar-result-icon,
  .sidebar-category-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-result-icon svg,
  .sidebar-category-icon svg {
    width: 100%;
    height: 100%;
  }

  .sidebar-result-icon {
    width: 24px;
    height: 24px;
  }

  .sidebar-category-icon {
    width: 32px;
    height: 32px;
  }
  .sidebar-category-label { flex: 1; }
  .sidebar-category-count {
    font-size: 12px;
    color: var(--navy-60);
    font-weight: 400;
  }

  .sidebar-show-all { border-top: 1px solid var(--cream-60); }

  #mapPlaceholder,
  #mapSpinner {
    position: absolute;
    inset: 0;
  }

  #mapPlaceholder {
    background: var(--map-bg) center/cover no-repeat;
    filter: blur(7px);
  }

  #mapSpinner {
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    color: var(--navy-80);
  }

  #mapSpinner span {
    width: 48px;
    height: 48px;
    animation: spin 2s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .map-marker {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid var(--cream);
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
    cursor: pointer;
    background: var(--navy);
  }

  .map-marker[data-type="shop"] { background: var(--pink); }
  .map-marker[data-type="gallery"] { background: var(--blue); }
  .map-marker[data-type="food"] { background: var(--orange); }

  .mapboxgl-popup-content {
    padding: 0;
    border-radius: 8px;
    overflow: hidden;
    font-family: "Montserrat", sans-serif;
    color: var(--navy);
    width: 200px;
    max-height: 300px;
  }

  .mapboxgl-popup-close-button {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--category-color, var(--navy));
    color: var(--cream);
    font-size: 18px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    top: 5px;
    right: 5px;
    z-index: 1;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    border: 1px solid var(--cream);
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .mapboxgl-popup-close-button:hover {
    background: var(--category-color, var(--navy));
    transform: scale(1.15);
    opacity: 0.85;
  }

  .mapboxgl-popup-content figure {
    margin: 0;
    line-height: 0;
    height: 120px;
    background: color-mix(in srgb, var(--category-color, white) 80%, transparent);
  }

  .mapboxgl-popup-content figure img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .mapboxgl-popup-content figure img[src^="data:"] { display: none; }

  .mapboxgl-popup-content h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 5px 0;
    color: var(--category-color, var(--navy));
  }

  .mapboxgl-popup-content .popup-icon {
    display: flex;
    flex-shrink: 0;
    width: 13px;
    height: 13px;
  }

  .mapboxgl-popup-content .popup-icon svg {
    width: 100%;
    height: 100%;
  }

  .mapboxgl-popup-content .popup-subtitle {
    margin: 4px 0 0.5rem;
    font-size: 12px;
    font-weight: 400;
    line-height: 1.3rem;
    color: var(--navy-60);
    padding: 0 5px;
    max-height: 5rem;
    overflow: hidden;
  }

  .mapboxgl-popup-content .popup-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border-top: 1px solid var(--category-color, var(--cream));
    font-size: 12px;
  }

  .mapboxgl-popup-content .today-hours {
    margin: 0;
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
  }

  .mapboxgl-popup-content a {
    font-weight: 600;
    color: var(--category-color, var(--navy));
    text-decoration: none;
    margin-left: auto;
  }

  .mapboxgl-popup-content a[href="#"] { display: none; }
</style>

<div class="map-container" id="mapContainer">
  <nav id="mapSidebar" class="hidden" aria-label="Store filter">
    <search class="sidebar-search">
      <label for="mapSearch" class="sr-only">Search stores</label>
      <input type="search" id="mapSearch" placeholder="Search stores..." autocomplete="off">
    </search>
    <button class="sidebar-back" id="mapBack" aria-label="Back to all categories">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      <span>All Categories</span>
    </button>
    <ul class="sidebar-results" id="mapSearchResults" role="listbox" aria-label="Search results"></ul>
    <p class="sidebar-no-results" id="mapNoResults" role="status" aria-live="polite">No results found</p>
    <fieldset class="sidebar-categories" id="mapCategories">
      <legend class="sr-only">Filter by category</legend>
      <button class="sidebar-category" data-type="shop" style="--cat-color: var(--pink)" aria-pressed="false">
        <span class="sidebar-category-icon" aria-hidden="true">{% include icons/windows/shops.svg %}</span>
        <span class="sidebar-category-label">Shops</span>
        <span class="sidebar-category-count">{{ site.shops | where_exp: "s", "s.coordinates" | size }}</span>
      </button>
      <button class="sidebar-category" data-type="gallery" style="--cat-color: var(--blue)" aria-pressed="false">
        <span class="sidebar-category-icon" aria-hidden="true">{% include icons/windows/galleries.svg %}</span>
        <span class="sidebar-category-label">Galleries</span>
        <span class="sidebar-category-count">{{ site.galleries | where_exp: "s", "s.coordinates" | size }}</span>
      </button>
      <button class="sidebar-category" data-type="food" style="--cat-color: var(--orange)" aria-pressed="false">
        <span class="sidebar-category-icon" aria-hidden="true">{% include icons/windows/foods.svg %}</span>
        <span class="sidebar-category-label">Food & Beverage</span>
        <span class="sidebar-category-count">{{ site.foods | where_exp: "s", "s.coordinates" | size }}</span>
      </button>
    </fieldset>
    <button class="sidebar-show-all" id="mapShowAll">
      <span class="sidebar-category-icon" aria-hidden="true">{% include icons/windows/default.svg %}</span>
      <span class="sidebar-category-label">Show All</span>
    </button>
  </nav>

  <button id="mapSidebarToggle" class="hidden" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div id="map" style="width:100%;height:100%;position:relative"
    data-focus-suite='{{ include.suite | escape }}'>
  <script type="application/json" id="mapStoreData">[{% assign has_prev = false %}{% for store in all_stores %}{% if store.coordinates %}{% if has_prev %},{% endif %}{"slug":{{ store.slug | jsonify }},"title":{{ store.title | jsonify }},"subtitle":{{ store.subtitle | jsonify }},"suite":{{ store.suite | default: "" | jsonify }},"coordinates":{{ store.coordinates | jsonify }},"image":{{ store.image | default: "" | jsonify }},"url":{{ store.url | jsonify }},"type":{{ store.store_type | jsonify }},"hours":{{ store.store_hours | default: "" | jsonify }}}{% assign has_prev = true %}{% endif %}{% endfor %}]</script>
    <div id="mapPlaceholder" style="--map-bg:url('{{ '/assets/images/map-placeholder.webp' | relative_url }}')"></div>
    <div id="mapSpinner">
      <span>{% include icons/loader.svg %}</span>
    </div>
  </div>
</div>

<template id="mapPopup">
  <section>
    <figure>
      <img src="$image" alt="$title">
    </figure>
    <h3>$icon$title</h3>
    <p class="popup-subtitle">$subtitle</p>
    <div class="popup-footer">
      <p class="today-hours">$todayHours</p>
      <a href="$url">Details</a>
    </div>
  </section>
</template>

<template id="storeIcons">
  <span class="sidebar-result-icon" data-type="shop">{% include icons/windows/shops.svg %}</span>
  <span class="sidebar-result-icon" data-type="gallery">{% include icons/windows/galleries.svg %}</span>
  <span class="sidebar-result-icon" data-type="food">{% include icons/windows/foods.svg %}</span>
  <span class="sidebar-result-icon" data-type="default">{% include icons/windows/default.svg %}</span>
</template>

<script>
  function initMap() {
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RvcmNoYWsiLCJhIjoiY21tZDZsMGdmMDAydDJwczhqbGhhOTNtciJ9.gPoufGUfsywbXf1wN8D0yw';
    // SL = vector tileset source-layer id, BLD = building outlines layer name
    const SL = '0a44077372e92fc898f4', BLD = 'building-outlines';
    const map = new mapboxgl.Map({
      container: 'map', style: 'mapbox://styles/storchak/cmmew5gbs000l01sbb2mld1pq',
      center: [-111.763522, 34.862363], zoom: 14, pitch: 45, bearing: -17,
      minZoom: 14, maxZoom: 20, maxBounds: [[-111.7659, 34.8606], [-111.7611, 34.8642]]
    });

    // Remove loading spinner and placeholder once map tiles are ready, then reveal sidebar
    const removeOverlay = () => {
      window.mapSpinner?.remove(); window.mapPlaceholder?.remove();
      mapSidebar.classList.remove('hidden');
      mapSidebarToggle.classList.remove('hidden');
    };
    map.loaded() ? removeOverlay() : map.on('load', removeOverlay);

    const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
    const typeColors = { shop: '--pink', gallery: '--blue', food: '--orange' };
    for (const t in typeColors) typeColors[t] = { hex: css(typeColors[t]), css: `var(${typeColors[t]})` };
    const defaultHex = typeColors.shop.hex, baseHex = css('--navy');

    // Helpers
    const bldSrc = (id) => ({ source: 'buildings', sourceLayer: SL, id }); // feature-state target for a building
    const isValidId = (id) => id && id !== 'null';
    const normSuite = (s) => s.toLowerCase().replace(/\s+/g, ''); // normalize suite ids for matching
    const parseCoords = (s) => s.split(',').map(Number); // parse "lng, lat" string to [lng, lat]
    const isSafeUrl = (u) => u && (u[0] === '/' || u.lastIndexOf('http', 0) === 0);
    const today = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
    const { content: iconsTpl } = window.storeIcons; // shared SVG icon <template>
    const getIcon = (t) => (iconsTpl.querySelector(`[data-type="${t||'default'}"]`) || iconsTpl.querySelector('[data-type="default"]')).cloneNode(true);

    // Building highlight state: activeIds = currently highlighted building ids
    // slugToIds/idSet = lookup tables built from tileset features after tiles load
    let activeIds = new Set(), slugToIds = new Map(), idSet = new Set(), ready = false, pending = null;

    // Clear all highlighted buildings
    const clearActive = () => { activeIds.forEach(id => map.setFeatureState(bldSrc(id), { active: false, color: null })); activeIds = new Set(); };

    // Highlight buildings by ids with category color
    const setActive = (ids, type) => {
      if (!ready || !ids?.length) return;
      const valid = ids.filter(isValidId);
      if (!valid.length) return;
      clearActive();
      activeIds = new Set(valid);
      const color = typeColors[type]?.hex || defaultHex;
      activeIds.forEach(id => map.setFeatureState(bldSrc(id), { active: true, color }));
    };

    const getIds = (s) => {
      if (!s) return [];
      const si = slugToIds.get(s.slug);
      if (si?.length) return si;
      if (!s.suite) return [];
      const n = normSuite(s.suite), d = n.indexOf('-'), p = d > 0 ? n.slice(0, d) : null;
      return idSet.has(n) ? [n] : p && idSet.has(p) ? [p] : [];
    };

    // Highlight building for a store; queues if tileset not yet loaded
    const activateStore = (store) => {
      if (!store) return;
      if (!ready) { pending = store; return; }
      const ids = getIds(store);
      if (ids.length) setActive(ids, store.type);
    };

    // --- Building tileset layer and interactions ---
    map.on('load', () => {
      // Add building outlines from Mapbox vector tileset
      map.addSource('buildings', { type: 'vector', url: 'mapbox://storchak.mv1ujm9r4n7l', promoteId: 'id' });
      map.addLayer({ id: BLD, type: 'fill-extrusion', source: 'buildings', 'source-layer': SL, paint: {
        'fill-extrusion-color': ['case', ['boolean', ['feature-state', 'active'], false], ['coalesce', ['feature-state', 'color'], defaultHex], baseHex],
        'fill-extrusion-height': 4, 'fill-extrusion-base': 0, 'fill-extrusion-opacity': 1
      }});

      // Add second dataset (zones / polygons) from tileset
      map.addSource('zones', { type: 'vector', url: 'mapbox://storchak.cmmorg5yk0cp11pol3pe7mk1w-9vzgq' });

      // Add parking zones layer
      // const ZONES_SL = 'tlaq-parkings';
      // map.addLayer({
      //   id: 'zones-fill', type: 'fill', source: 'zones', 'source-layer': ZONES_SL,
      //   paint: { 'fill-color': '#ff0000', 'fill-opacity': 0.3 }
      // });
      // map.addLayer({
      //   id: 'zones-outline', type: 'line', source: 'zones', 'source-layer': ZONES_SL,
      //   paint: { 'line-color': '#cc0000', 'line-width': 1.5 }
      // });
      // Add administrative borders from tileset
      map.addSource('borders', { type: 'vector', url: 'mapbox://storchak.cmmovfbhc0d9g1nolyol61q4j-0rjk4' });
      // Discover source-layer and add border layers
      const addBordersLayer = () => {
        const src = map.getSource('borders');
        if (!src || !src.vectorLayerIds?.length) return;
        const bordersSL = src.vectorLayerIds[0];
        map.addLayer({
          id: 'borders-line', type: 'line', source: 'borders', 'source-layer': bordersSL,
          paint: { 'line-color': css('--navy'), 'line-width': 2, 'line-dasharray': [3, 2], 'line-opacity': 0.6 }
        }, BLD); // below buildings
        map.addLayer({
          id: 'borders-fill', type: 'fill', source: 'borders', 'source-layer': bordersSL,
          paint: { 'fill-color': css('--navy'), 'fill-opacity': 0.03 }
        }, 'borders-line'); // below the border line
        map.off('sourcedata', onBordersData);
      };
      const onBordersData = (e) => { if (e.sourceId === 'borders' && e.isSourceLoaded) addBordersLayer(); };
      map.on('sourcedata', onBordersData);

      // Build slug/id lookup tables from loaded tileset features
      map.once('idle', () => {
        map.querySourceFeatures('buildings', { sourceLayer: SL }).forEach(f => {
          const { id, slug } = f.properties || {};
          if (isValidId(id)) idSet.add(id);
          if (slug && isValidId(id)) { const l = slugToIds.get(slug) || []; l.push(id); slugToIds.set(slug, l); }
        });
        ready = true;
        if (pending) { const q = pending; pending = null; activateStore(q); }
      });

      // Click building to highlight it and focus its store
      map.on('click', BLD, (e) => {
        const { slug, id } = e.features?.[0]?.properties || {};
        if (!isValidId(id)) return;
        const idx = slug ? bySlug.get(slug) : bySuite.get(id);
        setActive(slug ? (slugToIds.get(slug) || [id]) : [id], idx !== undefined ? stores[idx].type : undefined);
        if (idx !== undefined) focusStore(idx);
      });

      // Click empty space to clear building highlight
      map.on('click', (e) => { if (!map.queryRenderedFeatures(e.point, { layers: [BLD] }).length && activeIds.size) clearActive(); });

      // Pointer cursor on building hover
      map.on('mouseenter', BLD, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', BLD, () => { map.getCanvas().style.cursor = ''; });
    });

    // --- Popups ---

    // Build popup HTML from <template> with store data
    const renderPopup = (store) => {
      const icon = getIcon(store.type); icon.className = 'popup-icon';
      const data = { image: store.image || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
        title: store.title, subtitle: store.subtitle, icon: icon.outerHTML,
        url: isSafeUrl(store.url) ? store.url : '#', todayHours: store.hours?.[today] || '' };
      return window.mapPopup.innerHTML.replace(/\$(\w+)/g, (_, k) => data[k] ?? '');
    };

    // Create popup with single-open enforcement and category color
    let openPopup = null;
    const createPopup = (store) => {
      const p = new mapboxgl.Popup({ offset: 10, maxWidth: '200px', focusAfterOpen: false, anchor: 'bottom' }).setHTML(renderPopup(store));
      p.on('open', () => {
        // Close previous popup before opening new one (reassign first to prevent clearing buildings)
        if (openPopup && openPopup !== p) { const prev = openPopup; openPopup = p; prev.remove(); } else openPopup = p;
        typeColors[store.type]?.css && p.getElement().style.setProperty('--category-color', typeColors[store.type].css);
      });
      p.on('close', () => { if (openPopup === p) { openPopup = null; clearActive(); } });
      return p;
    };

    // --- Markers: parse store data, build lookups, place markers ---
    const stores = JSON.parse(window.mapStoreData.textContent);
    const markers = [], bySlug = new Map(), bySuite = new Map();
    stores.forEach((s, i) => {
      // Build slug/suite-to-index lookups for building click resolution
      if (s.slug) bySlug.set(s.slug, i);
      if (s.suite) { const n = normSuite(s.suite); bySuite.set(n, i); const d = n.indexOf('-'); if (d > 0) bySuite.set(n.slice(0, d), i); }
      // Create marker element and add to map
      const el = Object.assign(document.createElement('div'), { className: 'map-marker' }); el.dataset.type = s.type;
      const m = new mapboxgl.Marker({ element: el }).setLngLat(parseCoords(s.coordinates)).setPopup(createPopup(s)).addTo(map);
      m.getElement().addEventListener('click', (e) => { e.stopPropagation(); focusStore(i); });
      markers.push({ marker: m, type: s.type });
    });

    // Fly to a store, highlight its building, and open its popup
    const focusStore = (i, opts = {}) => {
      activateStore(stores[i]);
      map.flyTo({ center: parseCoords(stores[i].coordinates), zoom: 18, speed: 0.4, padding: { top: 150 }, ...opts });
      markers[i].marker.addTo(map); // ensure visible even if filtered out
      if (!markers[i].marker.getPopup().isOpen()) markers[i].marker.togglePopup();
    };

    // --- Sidebar: filtering, search, categories ---
    let activeFilter = null, activeResult = null;
    const { mapSearch, mapSearchResults, mapNoResults, mapCategories, mapBack, mapSidebar, mapShowAll, mapContainer, mapSidebarToggle } = window;
    const categories = mapCategories.querySelectorAll('.sidebar-category');
    const mobile = window.matchMedia('(max-width: 770px)');

    // Show/hide markers by predicate; close popup before removing
    const filterMarkers = (fn) => markers.forEach((m, i) => fn(m, i) ? m.marker.addTo(map) : (m.marker.getPopup().isOpen() && m.marker.togglePopup(), m.marker.remove()));
    const applyFilter = (t) => filterMarkers((m) => !t || m.type === t);

    // Build a sidebar list item that flies to store on click
    const renderItem = (i) => {
      const s = stores[i], li = document.createElement('li');
      li.className = 'sidebar-result'; li.setAttribute('role', 'option');
      if (typeColors[s.type]?.css) li.style.setProperty('--cat-color', typeColors[s.type].css);
      li.appendChild(getIcon(s.type));
      li.appendChild(Object.assign(document.createElement('span'), { textContent: s.title }));
      li.addEventListener('click', () => {
        activeResult?.classList.remove('active'); li.classList.add('active'); activeResult = li;
        focusStore(i);
        // Auto-close sidebar on mobile after selecting a store
        if (mobile.matches && !mapSidebar.classList.contains('collapsed')) { mapSidebar.classList.add('collapsed'); mapContainer.classList.add('sidebar-collapsed'); }
      });
      return li;
    };

    // Switch sidebar to sorted store list view
    const showList = (idx) => {
      mapCategories.style.display = 'none'; mapShowAll.style.display = 'none';
      mapBack.classList.add('visible'); mapSearchResults.innerHTML = ''; activeResult = null;
      if (idx.length) {
        mapNoResults.style.display = 'none';
        idx.sort((a, b) => stores[a].title.localeCompare(stores[b].title)).forEach(i => mapSearchResults.appendChild(renderItem(i)));
        mapSearchResults.classList.add('visible');
      } else { mapSearchResults.classList.remove('visible'); mapNoResults.style.display = 'block'; }
    };

    // Switch sidebar back to category view
    const showCats = () => { mapSearchResults.classList.remove('visible'); mapSearchResults.innerHTML = ''; mapNoResults.style.display = 'none'; mapBack.classList.remove('visible'); mapCategories.style.display = ''; mapShowAll.style.display = ''; };
    // Clear filter and return to categories
    const reset = () => { mapSearch.value = ''; activeFilter = null; categories.forEach(c => c.setAttribute('aria-pressed', 'false')); applyFilter(null); showCats(); };

    // Focus specific store when loaded from a store detail page
    const focusSuite = window.map.dataset.focusSuite;
    if (focusSuite) {
      mapSidebar.classList.add('collapsed'); mapContainer.classList.add('sidebar-collapsed');
      const idx = stores.findIndex(s => s.suite === focusSuite);
      if (idx !== -1) { const go = () => focusStore(idx, { speed: 0.6, padding: { top: 200 } }); map.loaded() ? go() : map.on('load', go); }
    }

    // Category click: toggle filter or drill into store list
    categories.forEach(cat => cat.addEventListener('click', () => {
      const t = cat.dataset.type; mapSearch.value = '';
      if (activeFilter === t) { reset(); return; }
      activeFilter = t; categories.forEach(c => c.setAttribute('aria-pressed', String(c === cat)));
      applyFilter(t); showList(stores.reduce((a, s, i) => (s.type === t && a.push(i), a), []));
    }));
    mapBack.addEventListener('click', reset);
    mapShowAll.addEventListener('click', reset);

    // Live search: filter markers and sidebar by store name
    mapSearch.addEventListener('input', () => {
      const q = mapSearch.value.trim().toLowerCase(); activeFilter = null;
      if (!q) { applyFilter(null); showCats(); return; }
      const m = new Set(), idx = stores.reduce((a, s, i) => { if (s.title.toLowerCase().includes(q)) { m.add(i); a.push(i); } return a; }, []);
      showList(idx); filterMarkers((_, i) => m.has(i));
    });

    // Toggle sidebar collapse
    mapSidebarToggle.addEventListener('click', () => { const c = mapSidebar.classList.toggle('collapsed'); mapContainer.classList.toggle('sidebar-collapsed', c); });
  }
</script>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.17.0/mapbox-gl.js" defer onload="setTimeout(initMap,1000)"></script>
