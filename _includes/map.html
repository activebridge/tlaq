{% comment %}Build store data as JSON from all collections{% endcomment %}
{% assign all_stores = site.shops | concat: site.galleries | concat: site.foods %}

<style>
  #map-placeholder {
    position: absolute;
    inset: 0;
    background: var(--map-bg) center/cover no-repeat;
    filter: blur(7px)
  }

  #map-spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    color: var(--navy-80)
  }

  #map-spinner span {
    width: 48px;
    height: 48px;
    animation: spin 2s linear infinite
  }

  @keyframes spin {
    to {
      transform: rotate(360deg)
    }
  }

  .map-marker {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid white;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    background: var(--navy);
  }

  .map-marker[data-type="shop"] { background: var(--pink) }
  .map-marker[data-type="gallery"] { background: var(--blue) }
  .map-marker[data-type="food"] { background: var(--orange) }

  .mapboxgl-popup-content {
    padding: 0;
    border-radius: 8px;
    overflow: hidden;
    font-family: "Montserrat", sans-serif;
    color: var(--navy);
    min-width: 200px;
  }

  .mapboxgl-popup-close-button {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--category-color, var(--navy));
    color: white;
    font-size: 18px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    top: 5px;
    right: 5px;
    z-index: 1;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    border: 1px solid white;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .mapboxgl-popup-close-button:hover {
    background: var(--category-color, var(--navy));
    transform: scale(1.15);
    opacity: 0.85;
  }

  .mapboxgl-popup-content figure {
    margin: 0;
    line-height: 0;
  }

  .mapboxgl-popup-content img {
    width: 100%;
    height: 120px;
    object-fit: cover;
  }

  .mapboxgl-popup-content h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 5px 0;
    color: var(--category-color, var(--navy));
  }

  .mapboxgl-popup-content .popup-icon {
    display: none;
    flex-shrink: 0;
    width: 13px;
    height: 13px;
  }

  .mapboxgl-popup-content .popup-icon.active {
    display: flex;
  }

  .mapboxgl-popup-content .popup-icon svg {
    width: 100%;
    height: 100%;
  }

  .mapboxgl-popup-content .popup-subtitle {
    margin: 4px 0 0.5rem;
    font-size: 12px;
    font-weight: 400;
    line-height: 1.3rem;
    color: var(--navy-60);
    padding: 0 5px;
  }

  .mapboxgl-popup-content .popup-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border-top: 1px solid var(--category-color, var(--cream));
    font-size: 12px;
  }

  .mapboxgl-popup-content .today-hours {
    margin: 0;
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
  }

  .mapboxgl-popup-content a {
    font-weight: 600;
    color: var(--category-color, var(--navy));
    text-decoration: none;
    margin-left: auto;
  }
</style>

<div id="map" style="width:100%;height:500px;position:relative"
  data-stores='[{% assign has_prev = false %}{% for store in all_stores %}{% if store.coordinates %}{% if has_prev %},{% endif %}{"title":"{{ store.title | escape }}","subtitle":"{{ store.subtitle | escape }}","coordinates":"{{ store.coordinates | escape }}","image":"{{ store.image | escape }}","url":"{{ store.url | escape }}","type":"{{ store.store_type | escape }}","hours":{{ '{' }}{% if store.store_hours %}{% for h in store.store_hours %}"{{ h[0] | escape }}":"{{ h[1] | escape }}"{% unless forloop.last %},{% endunless %}{% endfor %}{% endif %}} }{% assign has_prev = true %}{% endif %}{% endfor %}]'>
  <div id="map-placeholder" style="--map-bg:url('{{ '/assets/images/map-placeholder.webp' | relative_url }}')"></div>
  <div id="map-spinner">
    <span>{% include icons/loader.svg %}</span>
  </div>
</div>

<template id="mapPopup">
  <section>
    <figure>
      <img>
    </figure>
    <h3>
      <span class="popup-icon" data-type="shop">{% include icons/windows/shop.svg %}</span>
      <span class="popup-icon" data-type="gallery">{% include icons/windows/gallery.svg %}</span>
      <span class="popup-icon" data-type="food">{% include icons/windows/food.svg %}</span>
      <span class="popup-icon" data-type="default">{% include icons/windows/default.svg %}</span>
    </h3>
    <p class="popup-subtitle"></p>
    <div class="popup-footer">
      <p class="today-hours"></p>
      <a href="">Details</a>
    </div>
  </section>
</template>

<script>
  function initMap() {
    const style = "mapbox://styles/galulex/cmjjuexff009w01qz4awigw0q";
    const startingCoords = [-111.7635298, 34.8623132];
    if (!window.map) return;

    mapboxgl.accessToken = 'pk.eyJ1IjoiZ2FsdWxleCIsImEiOiJjamx6ampoZjgyMnYxM3FvZ2ppNjV2M2x5In0.bPgk2WI9NT-DJwnE-OtiLA';

    const map = new mapboxgl.Map({ container: 'map', style: style, center: startingCoords, zoom: 18, pitch: 45, bearing: -17 });

    function removeOverlay() {
      const spinner = document.getElementById('map-spinner');
      if (spinner) spinner.remove();
      const placeholder = document.getElementById('map-placeholder');
      if (placeholder) placeholder.remove();
    }

    map.loaded() ? removeOverlay() : map.on('load', removeOverlay);

    const isSafeUrl = (url) => url && (url[0] === '/' || url.lastIndexOf('http', 0) === 0);

    const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    const today = days[new Date().getDay()];

    function renderPopup(store) {
      const clone = document.getElementById('mapPopup').content.cloneNode(true);
      const img = clone.querySelector('img');
      store.image ? (img.src = store.image, img.alt = store.title) : img.closest('figure').remove();
      const icon = clone.querySelector('.popup-icon[data-type="' + (store.type || 'default') + '"]') || clone.querySelector('.popup-icon[data-type="default"]');
      icon.classList.add('active');
      clone.querySelector('h3').append(store.title);
      clone.querySelector('.popup-subtitle').textContent = store.subtitle;

      const link = clone.querySelector('a');
      isSafeUrl(store.url) ? link.href = store.url : link.remove();

      const hoursEl = clone.querySelector('.today-hours');
      const todayHours = store.hours && store.hours[today];
      todayHours ? hoursEl.textContent = 'Today: ' + todayHours : hoursEl.remove();

      const footer = clone.querySelector('.popup-footer');
      if (footer && !footer.children.length) footer.remove();

      return clone;
    }

    const typeColors = { shop: 'var(--pink)', gallery: 'var(--blue)', food: 'var(--orange)' };
    const createPopup = (store) => {
      const popup = new mapboxgl.Popup({ offset: 10, focusAfterOpen: false }).setDOMContent(renderPopup(store));
      if (typeColors[store.type]) popup.on('open', () => popup.getElement().querySelector('.mapboxgl-popup-content').style.setProperty('--category-color', typeColors[store.type]));
      return popup;
    };
    const stores = JSON.parse(window.map.dataset.stores || '[]');
    stores.forEach(function (store) {
      const coords = store.coordinates.split(',').map(function (c) { return parseFloat(c.trim()); });
      const flyOptions = { center: coords, padding: { top: 150 }, zoom: 18, speed: 0.4 };
      const el = document.createElement('div');
      el.className = 'map-marker';
      el.dataset.type = store.type;

      const marker = new mapboxgl.Marker({ element: el }).setLngLat(coords).setPopup(createPopup(store)).addTo(map);
      marker.getElement().addEventListener('click', function flyToStore() { map.flyTo(flyOptions); });
    });
  }
</script>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.17.0/mapbox-gl.js" defer onload="initMap()"></script>
