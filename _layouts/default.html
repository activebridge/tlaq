<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>
    {% include header.html %}
    <main class="{{ page.store_type }}">
      {{ content }}
    </main>
    {% include footer.html %}
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('{{ "/sw.js" | relative_url }}?v={{ site.time | date: "%s" }}');
      }
    </script>
  </body>
</html>
